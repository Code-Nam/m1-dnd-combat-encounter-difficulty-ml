# Environnement de développement : API + webapp avec hot reload.
# Lancement : docker compose up --build
#   API    → http://localhost:8000  (docs sur /docs)
#   Webapp → http://localhost:5173
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./api:/app/api
      - ./src:/app/src
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  webapp:
    build:
      context: ./webapp
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./webapp:/app
      # Volume anonyme : préserve le node_modules installé dans l'image,
      # sinon le mount ci-dessus l'écraserait avec celui de l'hôte (ou rien).
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
